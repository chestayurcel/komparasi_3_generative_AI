<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vanilla JS Tower Defense</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background: #1b1b1b;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px;
        color: white;
    }

    .container {
        display: flex;
        gap: 20px;
    }

    canvas {
        background: #222;
        border: 3px solid #555;
        cursor: crosshair;
    }

    .sidebar {
        width: 220px;
        background: #2d2d2d;
        padding: 20px;
        border: 3px solid #555;
    }

    .sidebar h1 {
        font-size: 24px;
        margin-bottom: 20px;
        text-align: center;
    }

    .stat {
        margin-bottom: 18px;
        padding: 12px;
        background: #3a3a3a;
        border-radius: 8px;
        font-size: 18px;
    }

    .instructions {
        margin-top: 20px;
        font-size: 14px;
        line-height: 1.5;
        color: #ccc;
    }

    .legend {
        margin-top: 20px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
        gap: 10px;
    }

    .color-box {
        width: 18px;
        height: 18px;
    }
</style>
</head>
<body>

<div class="container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="sidebar">
        <h1>Tower Defense</h1>

        <div class="stat">❤️ Health: <span id="health">10</span></div>
        <div class="stat">🪙 Coins: <span id="coins">150</span></div>
        <div class="stat">⭐ Score: <span id="score">0</span></div>

        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background:red;"></div>
                <span>Enemy</span>
            </div>

            <div class="legend-item">
                <div class="color-box" style="background:blue;"></div>
                <span>Tower</span>
            </div>

            <div class="legend-item">
                <div class="color-box" style="background:yellow;"></div>
                <span>Projectile</span>
            </div>
        </div>

        <div class="instructions">
            <p><strong>Instructions:</strong></p>
            <p>- Click on the map to place towers.</p>
            <p>- Towers cost 50 coins.</p>
            <p>- Prevent enemies from reaching the base.</p>
        </div>
    </div>
</div>

<script>
class Enemy {
    constructor(path) {
        this.path = path;
        this.x = path[0].x;
        this.y = path[0].y;
        this.radius = 12;
        this.speed = 1.2;
        this.maxHealth = 100;
        this.health = this.maxHealth;
        this.waypointIndex = 1;
        this.dead = false;
    }

    update() {
        if (this.waypointIndex >= this.path.length) {
            return true;
        }

        const target = this.path[this.waypointIndex];
        const dx = target.x - this.x;
        const dy = target.y - this.y;
        const distance = Math.hypot(dx, dy);

        if (distance < this.speed) {
            this.x = target.x;
            this.y = target.y;
            this.waypointIndex++;
        } else {
            this.x += (dx / distance) * this.speed;
            this.y += (dy / distance) * this.speed;
        }

        return false;
    }

    draw(ctx) {
        ctx.beginPath();
        ctx.fillStyle = "red";
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        const barWidth = 30;
        const healthRatio = this.health / this.maxHealth;

        ctx.fillStyle = "black";
        ctx.fillRect(this.x - 15, this.y - 22, barWidth, 5);

        ctx.fillStyle = "lime";
        ctx.fillRect(this.x - 15, this.y - 22, barWidth * healthRatio, 5);
    }
}

class Tower {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = 30;
        this.range = 140;
        this.fireRate = 45;
        this.cooldown = 0;
    }

    update(enemies, projectiles) {
        if (this.cooldown > 0) {
            this.cooldown--;
        }

        let nearestEnemy = null;
        let nearestDistance = Infinity;

        for (const enemy of enemies) {
            const distance = Math.hypot(enemy.x - this.x, enemy.y - this.y);

            if (distance <= this.range && distance < nearestDistance) {
                nearestDistance = distance;
                nearestEnemy = enemy;
            }
        }

        if (nearestEnemy && this.cooldown <= 0) {
            projectiles.push(new Projectile(this.x, this.y, nearestEnemy));
            this.cooldown = this.fireRate;
        }
    }

    draw(ctx) {
        ctx.fillStyle = "blue";
        ctx.fillRect(
            this.x - this.size / 2,
            this.y - this.size / 2,
            this.size,
            this.size
        );

        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
        ctx.stroke();
    }
}

class Projectile {
    constructor(x, y, target) {
        this.x = x;
        this.y = y;
        this.target = target;
        this.radius = 5;
        this.speed = 5;
        this.damage = 34;
        this.destroyed = false;
    }

    update() {
        if (!this.target || this.target.dead) {
            this.destroyed = true;
            return;
        }

        const dx = this.target.x - this.x;
        const dy = this.target.y - this.y;
        const distance = Math.hypot(dx, dy);

        if (distance < this.speed + this.target.radius) {
            this.target.health -= this.damage;

            if (this.target.health <= 0) {
                this.target.dead = true;
            }

            this.destroyed = true;
            return;
        }

        this.x += (dx / distance) * this.speed;
        this.y += (dy / distance) * this.speed;
    }

    draw(ctx) {
        ctx.beginPath();
        ctx.fillStyle = "yellow";
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

class GameManager {
    constructor(canvas, ctx) {
        this.canvas = canvas;
        this.ctx = ctx;

        this.path = [
            { x: 0, y: 100 },
            { x: 220, y: 100 },
            { x: 220, y: 250 },
            { x: 520, y: 250 },
            { x: 520, y: 450 },
            { x: 760, y: 450 },
            { x: 760, y: 560 }
        ];

        this.enemies = [];
        this.towers = [];
        this.projectiles = [];

        this.health = 10;
        this.coins = 150;
        this.score = 0;

        this.enemySpawnTimer = 0;
        this.enemySpawnRate = 90;

        this.gameOver = false;

        this.bindEvents();
        this.updateUI();
    }

    bindEvents() {
        this.canvas.addEventListener("click", (event) => {
            if (this.gameOver) return;

            const rect = this.canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            this.placeTower(x, y);
        });
    }

    updateUI() {
        document.getElementById("health").textContent = this.health;
        document.getElementById("coins").textContent = this.coins;
        document.getElementById("score").textContent = this.score;
    }

    spawnEnemy() {
        this.enemies.push(new Enemy(this.path));
    }

    placeTower(x, y) {
        const towerCost = 50;
        const towerSize = 30;

        if (this.coins < towerCost) return;

        if (this.isOnPath(x, y, towerSize)) return;

        for (const tower of this.towers) {
            const distance = Math.hypot(tower.x - x, tower.y - y);

            if (distance < tower.size) {
                return;
            }
        }

        this.towers.push(new Tower(x, y));
        this.coins -= towerCost;
        this.updateUI();
    }

    isOnPath(x, y, size) {
        const half = size / 2;
        const pathWidth = 50;

        for (let i = 0; i < this.path.length - 1; i++) {
            const p1 = this.path[i];
            const p2 = this.path[i + 1];

            const minX = Math.min(p1.x, p2.x) - pathWidth / 2 - half;
            const maxX = Math.max(p1.x, p2.x) + pathWidth / 2 + half;

            const minY = Math.min(p1.y, p2.y) - pathWidth / 2 - half;
            const maxY = Math.max(p1.y, p2.y) + pathWidth / 2 + half;

            if (x >= minX && x <= maxX && y >= minY && y <= maxY) {
                return true;
            }
        }

        return false;
    }

    drawPath() {
        this.ctx.strokeStyle = "#bbbbbb";
        this.ctx.lineWidth = 50;
        this.ctx.lineCap = "round";
        this.ctx.lineJoin = "round";

        this.ctx.beginPath();
        this.ctx.moveTo(this.path[0].x, this.path[0].y);

        for (let i = 1; i < this.path.length; i++) {
            this.ctx.lineTo(this.path[i].x, this.path[i].y);
        }

        this.ctx.stroke();

        this.ctx.fillStyle = "green";
        this.ctx.beginPath();
        this.ctx.arc(this.path[0].x, this.path[0].y, 20, 0, Math.PI * 2);
        this.ctx.fill();

        const end = this.path[this.path.length - 1];

        this.ctx.fillStyle = "purple";
        this.ctx.beginPath();
        this.ctx.arc(end.x, end.y, 20, 0, Math.PI * 2);
        this.ctx.fill();
    }

    update() {
        if (this.gameOver) return;

        this.enemySpawnTimer++;

        if (this.enemySpawnTimer >= this.enemySpawnRate) {
            this.spawnEnemy();
            this.enemySpawnTimer = 0;
        }

        for (let i = this.enemies.length - 1; i >= 0; i--) {
            const enemy = this.enemies[i];
            const reachedEnd = enemy.update();

            if (reachedEnd || enemy.waypointIndex >= enemy.path.length) {
                this.health--;
                this.enemies.splice(i, 1);
                this.updateUI();

                if (this.health <= 0) {
                    this.gameOver = true;
                }

                continue;
            }

            if (enemy.dead) {
                this.coins += 20;
                this.score += 10;
                this.enemies.splice(i, 1);
                this.updateUI();
            }
        }

        for (const tower of this.towers) {
            tower.update(this.enemies, this.projectiles);
        }

        for (let i = this.projectiles.length - 1; i >= 0; i--) {
            const projectile = this.projectiles[i];

            projectile.update();

            if (projectile.destroyed) {
                this.projectiles.splice(i, 1);
            }
        }
    }

    drawBackground() {
        this.ctx.fillStyle = "#2f7d32";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    }

    drawGrid() {
        this.ctx.strokeStyle = "rgba(255,255,255,0.05)";
        this.ctx.lineWidth = 1;

        for (let x = 0; x < this.canvas.width; x += 40) {
            this.ctx.beginPath();
            this.ctx.moveTo(x, 0);
            this.ctx.lineTo(x, this.canvas.height);
            this.ctx.stroke();
        }

        for (let y = 0; y < this.canvas.height; y += 40) {
            this.ctx.beginPath();
            this.ctx.moveTo(0, y);
            this.ctx.lineTo(this.canvas.width, y);
            this.ctx.stroke();
        }
    }

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        this.drawBackground();
        this.drawGrid();
        this.drawPath();

        for (const tower of this.towers) {
            tower.draw(this.ctx);
        }

        for (const enemy of this.enemies) {
            enemy.draw(this.ctx);
        }

        for (const projectile of this.projectiles) {
            projectile.draw(this.ctx);
        }

        if (this.gameOver) {
            this.ctx.fillStyle = "rgba(0,0,0,0.6)";
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            this.ctx.fillStyle = "white";
            this.ctx.font = "bold 64px Arial";
            this.ctx.textAlign = "center";
            this.ctx.fillText(
                "GAME OVER",
                this.canvas.width / 2,
                this.canvas.height / 2
            );

            this.ctx.font = "28px Arial";
            this.ctx.fillText(
                `Final Score: ${this.score}`,
                this.canvas.width / 2,
                this.canvas.height / 2 + 60
            );
        }
    }

    loop() {
        this.update();
        this.draw();

        if (!this.gameOver) {
            requestAnimationFrame(() => this.loop());
        }
    }
}

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const game = new GameManager(canvas, ctx);
game.loop();
</script>

</body>
</html>
